name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  setup:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  typecheck:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

  test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    needs: [lint, typecheck]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter web test

  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    needs: [lint, typecheck]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  syncpack:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check dependency version consistency
        run: pnpm syncpack

  knip:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run knip
        run: pnpm knip

  jscpd:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run duplicate code detection
        run: pnpm jscpd

  release:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [test, build, syncpack, knip, jscpd]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "Previous tag: $PREVIOUS_TAG"
            RANGE="${PREVIOUS_TAG}..${TAG_NAME}"
          else
            echo "No previous tag found — generating changelog for all commits"
            RANGE="${TAG_NAME}"
          fi

          CHANGELOG_FILE="CHANGELOG_${TAG_NAME}.md"

          {
            echo "## What's Changed"
            echo ""

            FEATS=$(git log --pretty=format:"- %s (%h)" --no-merges "$RANGE" | grep -E '^- feat(\([^)]*\))?:' || true)
            if [ -n "$FEATS" ]; then
              echo "### 🚀 Features"
              echo "$FEATS"
              echo ""
            fi

            FIXES=$(git log --pretty=format:"- %s (%h)" --no-merges "$RANGE" | grep -E '^- fix(\([^)]*\))?:' || true)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            DOCS=$(git log --pretty=format:"- %s (%h)" --no-merges "$RANGE" | grep -E '^- docs(\([^)]*\))?:' || true)
            if [ -n "$DOCS" ]; then
              echo "### 📚 Documentation"
              echo "$DOCS"
              echo ""
            fi

            OTHERS=$(git log --pretty=format:"- %s (%h)" --no-merges "$RANGE" | grep -vE '^- (feat|fix|docs)(\([^)]*\))?:' || true)
            if [ -n "$OTHERS" ]; then
              echo "### 📝 Other Changes"
              echo "$OTHERS"
              echo ""
            fi

            if [ -n "$PREVIOUS_TAG" ]; then
              echo "**Full Changelog**: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${TAG_NAME}"
            fi
          } > "$CHANGELOG_FILE"

          echo "changelog_file=$CHANGELOG_FILE" >> "$GITHUB_OUTPUT"
          echo "Generated changelog:"
          cat "$CHANGELOG_FILE"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG_NAME" \
            --title "Release $TAG_NAME" \
            --notes-file "${{ steps.changelog.outputs.changelog_file }}"
