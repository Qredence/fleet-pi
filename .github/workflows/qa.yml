name: QA

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to test"
        required: false
        default: ""

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      CI: true
      AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y -qq imagemagick

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install droid CLI
        run: curl -fsSL https://app.factory.ai/cli | sh

      - name: Run QA
        id: qa
        timeout-minutes: 20
        continue-on-error: true
        run: |
          export PATH="$HOME/.factory/bin:$PATH"
          droid exec --auto high --prompt "
          You are running in a non-interactive CI environment. There is NO human available.
          Do NOT use AskUser, do NOT wait for confirmations, do NOT pause for input.
          Run the qa skill. Write the final report to qa-results/report.md.
          "

      - name: Ensure QA report exists
        if: always()
        run: |
          mkdir -p qa-results
          if [ ! -f qa-results/report.md ]; then
            echo "## QA Report" > qa-results/report.md
            echo "" >> qa-results/report.md
            echo "No report was generated. Check the workflow logs for details." >> qa-results/report.md
          fi

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-results-${{ github.run_number }}
          path: qa-results/
          retention-days: 14
