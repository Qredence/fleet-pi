name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  syncpack:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check dependency version consistency
        run: pnpm syncpack

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Record test start time
        id: test-start
        run: |
          START_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          START_EPOCH=$(date -u +%s)
          echo "start_time=${START_TIME}" >> "$GITHUB_OUTPUT"
          echo "start_epoch=${START_EPOCH}" >> "$GITHUB_OUTPUT"
          echo "Tests started at: ${START_TIME}"

      - name: Run tests
        id: test-run
        run: pnpm --filter web test

      - name: Record test end time and generate metrics
        if: always() && steps.test-start.outcome == 'success'
        id: test-metrics
        run: |
          END_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          END_EPOCH=$(date -u +%s)
          START_EPOCH=${{ steps.test-start.outputs.start_epoch }}
          DURATION=$((END_EPOCH - START_EPOCH))

          # Human-readable duration
          if [ $DURATION -lt 60 ]; then
            DURATION_HUMAN="${DURATION}s"
          else
            MINUTES=$((DURATION / 60))
            SECONDS=$((DURATION % 60))
            DURATION_HUMAN="${MINUTES}m ${SECONDS}s"
          fi

          echo "end_time=${END_TIME}" >> "$GITHUB_OUTPUT"
          echo "duration_seconds=${DURATION}" >> "$GITHUB_OUTPUT"
          echo "duration_human=${DURATION_HUMAN}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║         Test Performance Metrics         ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║ Commit SHA:    ${{ github.sha }}         ║"
          echo "║ Start Time:    ${{ steps.test-start.outputs.start_time }} ║"
          echo "║ End Time:      ${END_TIME} ║"
          echo "║ Duration:      ${DURATION_HUMAN} (${DURATION}s) ║"
          echo "║ Test Status:   ${{ steps.test-run.outcome }} ║"
          echo "╚══════════════════════════════════════════╝"
          echo ""

          mkdir -p test-metrics

          # JSON artifact for structured comparison across runs
          cat > test-metrics/test-perf.json <<EOF
          {
            "commit_sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "run_id": ${{ github.run_id }},
            "run_number": ${{ github.run_number }},
            "start_time": "${{ steps.test-start.outputs.start_time }}",
            "end_time": "${END_TIME}",
            "duration_seconds": ${DURATION},
            "duration_human": "${DURATION_HUMAN}",
            "repository": "${{ github.repository }}",
            "workflow": "${{ github.workflow }}",
            "test_status": "${{ steps.test-run.outcome }}"
          }
          EOF

          # Markdown artifact for human readability
          cat > test-metrics/test-perf.md <<EOF
          # Test Performance Report

          | Metric           | Value                                      |
          |------------------|--------------------------------------------|
          | Commit SHA       | \`${{ github.sha }}\`                       |
          | Ref              | \`${{ github.ref }}\`                       |
          | Run ID           | ${{ github.run_id }}                       |
          | Run Number       | ${{ github.run_number }}                   |
          | Start Time       | ${{ steps.test-start.outputs.start_time }} |
          | End Time         | ${END_TIME}                                |
          | Duration         | **${DURATION_HUMAN}** (${DURATION} seconds) |
          | Test Status      | ${{ steps.test-run.outcome }}              |
          | Repository       | ${{ github.repository }}                   |
          | Workflow         | ${{ github.workflow }}                     |

          ---
          Generated by CI test job.
          EOF

      - name: Upload test metrics artifact
        if: always() && steps.test-metrics.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: test-metrics-${{ github.run_id }}-${{ github.run_attempt }}
          path: test-metrics/
          retention-days: 30

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Record build start time
        id: build-start
        run: |
          START_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          START_EPOCH=$(date -u +%s)
          echo "start_time=${START_TIME}" >> "$GITHUB_OUTPUT"
          echo "start_epoch=${START_EPOCH}" >> "$GITHUB_OUTPUT"
          echo "Build started at: ${START_TIME}"

      - name: Build
        id: build
        run: pnpm build

      - name: Record build end time and generate metrics
        if: always() && steps.build-start.outcome == 'success'
        id: build-metrics
        run: |
          END_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          END_EPOCH=$(date -u +%s)
          START_EPOCH=${{ steps.build-start.outputs.start_epoch }}
          DURATION=$((END_EPOCH - START_EPOCH))

          # Human-readable duration
          if [ $DURATION -lt 60 ]; then
            DURATION_HUMAN="${DURATION}s"
          else
            MINUTES=$((DURATION / 60))
            SECONDS=$((DURATION % 60))
            DURATION_HUMAN="${MINUTES}m ${SECONDS}s"
          fi

          echo "end_time=${END_TIME}" >> "$GITHUB_OUTPUT"
          echo "duration_seconds=${DURATION}" >> "$GITHUB_OUTPUT"
          echo "duration_human=${DURATION_HUMAN}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║        Build Performance Metrics         ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║ Commit SHA:    ${{ github.sha }}         ║"
          echo "║ Start Time:    ${{ steps.build-start.outputs.start_time }} ║"
          echo "║ End Time:      ${END_TIME} ║"
          echo "║ Duration:      ${DURATION_HUMAN} (${DURATION}s) ║"
          echo "╚══════════════════════════════════════════╝"
          echo ""

          mkdir -p build-metrics

          # JSON artifact for structured comparison across runs
          cat > build-metrics/build-perf.json <<EOF
          {
            "commit_sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "run_id": ${{ github.run_id }},
            "run_number": ${{ github.run_number }},
            "start_time": "${{ steps.build-start.outputs.start_time }}",
            "end_time": "${END_TIME}",
            "duration_seconds": ${DURATION},
            "duration_human": "${DURATION_HUMAN}",
            "repository": "${{ github.repository }}",
            "workflow": "${{ github.workflow }}",
            "build_status": "${{ steps.build.outcome }}"
          }
          EOF

          # Markdown artifact for human readability
          cat > build-metrics/build-perf.md <<EOF
          # Build Performance Report

          | Metric           | Value                                      |
          |------------------|--------------------------------------------|
          | Commit SHA       | \`${{ github.sha }}\`                       |
          | Ref              | \`${{ github.ref }}\`                       |
          | Run ID           | ${{ github.run_id }}                       |
          | Run Number       | ${{ github.run_number }}                   |
          | Start Time       | ${{ steps.build-start.outputs.start_time }} |
          | End Time         | ${END_TIME}                                |
          | Duration         | **${DURATION_HUMAN}** (${DURATION} seconds) |
          | Build Status     | ${{ steps.build.outcome }}                 |
          | Repository       | ${{ github.repository }}                   |
          | Workflow         | ${{ github.workflow }}                     |

          ---
          Generated by CI build job.
          EOF

      - name: Upload build metrics artifact
        if: always() && steps.build-metrics.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: build-metrics-${{ github.run_id }}-${{ github.run_attempt }}
          path: build-metrics/
          retention-days: 30

      - name: Upload bundle report artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/web/bundle-report/
          retention-days: 30

  knip:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run knip
        run: pnpm knip

  jscpd:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run duplicate code detection
        run: pnpm jscpd

      - name: Upload jscpd report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jscpd-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: report/
          retention-days: 30
