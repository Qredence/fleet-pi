# QA Install Progress — generated 2026-05-03
# Delete this file to restart the questionnaire from scratch.

phase: completed
categories:
  default_target:
    environments:
      - dev (localhost:3000)
    default_target: dev
    restrictions:
      - "Requires AWS credentials with Bedrock access for chat functionality"

  personas:
    - name: anonymous
      description: Anonymous user with no authentication required
      email: null
      credentials_source: null
      test_focus:
        - chat
        - tools
        - sessions
        - plan_mode
        - model_selection
        - workspace_browser
      cannot_do: []

    - name: fresh_session
      description: New session with no prior chat history
      email_pattern: null
      test_focus:
        - onboarding
        - empty_states
        - first_message
        - session_creation

  critical_flows:
    - Page Load & Initial State
    - Send Chat Message & Stream Response
    - Tool Execution Cards (read/write/edit/bash)
    - Session Management (new/resume/list/hydrate)
    - Model Selection
    - Agent / Plan Mode Switching
    - Plan Mode Question Prompts
    - Follow-up Queuing
    - Abort Streaming
    - Workspace / Resources Browser
    - Error Handling & Graceful Fallbacks

  external_services:
    - provider: amazon-bedrock
      test_mode: uses AWS credentials from env
      notes: LLM inference requires valid AWS credentials with Bedrock access

  cleanup:
    auto_cleanup: true
    strategy: delete-test-users
    instructions: Delete temporary Pi sessions via /api/chat/sessions and workspace files via /api/workspace/file as needed. Sessions under .fleet/sessions and agent-workspace/ temp files should be removed after testing.

  imagemagick:
    installed: true
    path: /opt/homebrew/bin/magick

  github_action:
    generate: true
    required: optional
    wait_for_preview: false
    strategy: local_dev_server

  failure_learning:
    mode: suggest_in_report
