cli_auth_credentials_store = "file"
allow_login_shell = false

[shell_environment_policy]
inherit = "core"
include_only = [
  "PATH",
  "HOME",
  "ANTHROPIC_API_KEY",
  "ANTHROPIC_OAUTH_KEY",
  "AWS_BEARER_TOKEN_BEDROCK",
  "CLAUDE_CODE_USE_BEDROCK",
  "AWS_REGION",
  "ANTHROPIC_MODEL",
]
experimental_use_profile = false
